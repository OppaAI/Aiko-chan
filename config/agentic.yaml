# Agentic config
#
# Settings for core/agentic.py plus chat-vs-agent routing used by core/think.py.
# Use this to tune when Aiko enters tool/task mode and how much work one task may do.

# -- Agent loop limits --
MAX_AGENT_ITER: "8"  # Maximum tool/planning iterations per task; raise for complex tasks, lower for safety.
ROUTER_MODEL: "smollm"  # Small model for LLM routing fallback; only used when ROUTE_MODE needs LLM routing.
AGENT_MAX_TOKENS: "512"  # Max model output tokens per agent step.
AGENT_NOTE_MAX_CHARS: "1500"  # Max characters from notes/files injected into an agent step.
AGENT_TOOL_RESULT_MAX_CHARS: "3000"  # Max characters retained from one tool result.
AGENT_MEMORY_DRAIN_TIMEOUT: "0.25"  # Seconds to wait for pending memory writes before an agent task starts.
MEMORY_AGENT_DRAIN_TIMEOUT: "0.25"  # Legacy alias for AGENT_MEMORY_DRAIN_TIMEOUT; keep same value.
AGENT_MEMORY_RECALL_LIMIT: "2"  # Number of memories injected into agent context; keep low to save tokens.

# -- Verification and retries --
AGENT_VERIFY_FINAL: "1"  # Final-answer verifier toggle; options: 1/0, true/false, yes/no, on/off.
AGENT_VERIFY_LLM: "1"  # Use an LLM call for final verification; options: 1/0, true/false, yes/no, on/off.
AGENT_MAX_FINAL_REPAIRS: "1"  # Max attempts to repair a final answer that fails verification.
AGENT_VERIFY_MIN_SCORE: "0.70"  # Minimum verifier score when LLM verification is enabled; range 0.0-1.0.
AGENT_TOOL_RETRY_BACKOFF: "0.2"  # Seconds to wait before retrying a failed tool call.
AGENT_WEB_TOOL_ATTEMPTS: "2"  # Retry attempts for web-backed tools.
AGENT_LOCAL_TOOL_ATTEMPTS: "1"  # Retry attempts for local filesystem/workspace tools.

# -- Workspace tool limits --
MAX_WRITE_CHARS: "20000"  # Max characters allowed when agent saves a note/draft.
MAX_READ_CHARS: "12000"  # Max characters returned when agent reads a workspace file.

# -- Routing --
ROUTE_ENABLED: "1"  # Automatic chat-vs-agent routing toggle; options: 1/0, true/false, yes/no, on/off.
ROUTE_MODE: "semantic"  # Routing strategy; options: semantic, semantic_only, llm, llm_only, chat/off/disabled.
ROUTE_AGENTIC_THRESHOLD: "0.65"   # Route to agentic if score > this
ROUTE_WEBCHAT_THRESHOLD: "0.60"   # Route to webchat if score > this (else localchat)
ROUTE_LABEL_TOP_K: "3"  # Average each label strongest N examples; higher is smoother but less sharp.
ROUTE_MIN_GAP: "0.025"  # Required score gap between best and second route labels.
