# Experience vector-store config
#
# Settings for core/experience.py, Aiko's machine-written procedural trace of
# completed agentic tasks. Experience stores sanitized goal -> steps -> outcome
# records for later RAG recall. It does not use memory forgetting/decay.

EXPERIENCE_DB_PATH: "experience/experience.db"  # Relative paths live under the active user's state dir; encrypted when SQLITE_ENCRYPTION=1.
EXPERIENCE_CONTEXT_CHARS: "2500"  # Max similar-task context characters injected into task mode.
EXPERIENCE_KNN_LIMIT: "20"  # sqlite-vec semantic candidates before RRF fusion.
EXPERIENCE_FTS_LIMIT: "20"  # FTS5 lexical candidates before RRF fusion.
EXPERIENCE_RRF_K: "60"  # Reciprocal Rank Fusion constant; higher dampens rank differences.
EXPERIENCE_RECALL_SCORE_THRESHOLD: "0.012"  # Minimum fused score for a past task to be injected.
EXPERIENCE_MAX_ROWS: "5000"  # Hard cap per user; lowest-scored/oldest rows are pruned only to limit noise/storage.
EXPERIENCE_QUERY_INSTRUCT: "Retrieve similar past agentic task runs"
