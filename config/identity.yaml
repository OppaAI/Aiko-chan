# Identity config
#
# Names used in prompts, logs, memories, and UI labels.
# Edit these when changing the assistant display name or the primary user profile.

# -- Identity --
AI_NAME: "Aiko"  # Assistant display name used in prompts and UI; usually Aiko.

# -- User State Root --
USER_STATE_ROOT: "~/.aiko"  # Root directory for user state. User-specific data stored under ~/.aiko/<user_id>/
