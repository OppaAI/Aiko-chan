# Config index
#
# core/config.py loads the YAML files listed here, in order.
# Put new config YAML files in this list when adding them.
configs:
- identity.yaml  # assistant/user names
- think.yaml  # chat LLM and sampling
- agentic.yaml  # agent loop and routing
- knowledge.yaml  # knowledge base / RAG sources
- memorize.yaml  # memory, embeddings, decay, consolidation
- skills.yaml  # skill registry / capabilities
- learn.yaml  # quick/deep studying + idle learner tunables
- speak.yaml  # TTS output
- listen.yaml  # ASR input, VAD, speaker verification
- web.yaml  # SearXNG/search
- ui.yaml  # TUI/WebUI display and ports
- schedule.yaml  # scheduler paths and system job times
- proactive.yaml  # proactive idle check-ins
- reflect.yaml  # reflection publishing
- social.yaml  # weekly social drafting/posting
- log.yaml  # logging and health cache
