# Learned knowledge vector-store config
#
# Settings for core/knowledge.py, Aiko's machine-writable RAG store for
# durable learned facts, user-ingested document/PDF text, and self-learning
# research notes. This is separate from core/wiki.py, which indexes
# human-authored wiki/skill/persona/config files.

KNOWLEDGE_DB_PATH: "knowledge/knowledge.db"  # Relative paths are stored under the active user's state dir; encrypted when SQLITE_ENCRYPTION=1.
KNOWLEDGE_WORKSPACE_DIR: ""  # Default ~/.aiko/<user_id>/library; empty = use code default
KNOWLEDGE_STORE_CHUNK_CHARS: "900"  # Chunk size at ingest time; chunks are embedded once and stored individually.
KNOWLEDGE_CONTEXT_CHARS: "3500"  # Max learned-knowledge context characters injected into a prompt.
KNOWLEDGE_KNN_LIMIT: "20"  # sqlite-vec semantic candidates before RRF fusion.
KNOWLEDGE_FTS_LIMIT: "20"  # FTS5 lexical candidates before RRF fusion.
KNOWLEDGE_RRF_K: "60"  # Reciprocal Rank Fusion constant; higher dampens rank differences.
KNOWLEDGE_RECALL_SCORE_THRESHOLD: "0.012"  # Minimum fused score for a learned chunk to be injected.
KNOWLEDGE_QUERY_INSTRUCT: "Retrieve durable learned knowledge relevant to the request"

# Learn config
#
# Settings for core/learn.py — Aiko's two research depths (quick_studying,
# deep_studying) and the idle learner loop that decides when to run them.
# Both depths sit on top of core/toolkit/researcher.py's primitives
# (see web.yaml for the shared search/fetch/condense tunables they inherit).

# -- idle learner loop (when Aiko is allowed to self-study at all) --
IDLE_LEARNER_CHECK_INTERVAL: "300"  # How often (seconds) the loop wakes up to check idle conditions. Doesn't trigger study by itself.
IDLE_LEARN_SECONDS: "1800"  # Short-idle threshold. Once chat has been quiet this long (and TTS isn't playing), the loop is allowed to run QUICK study. 30 min default — "I'm around but not talking right now."
DEEP_IDLE_LEARN_SECONDS: "7200"  # Long-idle threshold. Once chat has been quiet THIS long, the loop escalates to DEEP study instead of quick. 2 hr default — "I'm at work / asleep." NOTE: not yet read by learn.py — idle_learner_loop currently only checks IDLE_LEARN_SECONDS and always calls quick_studying; this is the knob to wire up when the two-depth escalation logic gets built.

# -- topic queue (planned, not yet implemented) --
# The intent: give Aiko a standing list of topics instead of inferring one
# from the last chat message. Quick study pulls the current topic, may not
# finish it in one pass, and should resume the SAME topic next idle window
# instead of restarting. Deep study works a topic across many differently-
# angled sub-queries until it has an answer, then advances the queue.
# None of this state (current topic pointer, partial-progress record,
# per-topic "answered" flag) exists in learn.py yet — these are placeholders
# for when that gets built, not live settings.
# LEARN_TOPIC_QUEUE_PATH: "~/.aiko/learn_topics.json"  # Ordered topic list + resume pointer. TODO.
# LEARN_TOPIC_RESUME_ENABLED: "true"  # Whether quick_studying should resume a partial topic rather than always taking the latest chat message. TODO.

# -- quick_studying (thin alias over deep_research; interactive-scale) --
QUICK_STUDY_MAX_ROUNDS: "5"  # Fetched-source research rounds for a quick study pass (was hardcoded to 3 in learn.py's quick_studying() default — pull this out to an env-backed constant to make it configurable). Each round uses deep_research fetched-source settings in web.yaml (DEEP_RESEARCH_NUM_FETCHES / DEEP_RESEARCH_MAX_CHARS_PER_PAGE). Raised from 3 to 5 per your request — more coverage per short idle gap, still cheap enough to not block a "quick" pass.

# -- deep_studying (autonomous, long-running; genuine idle/overnight) --
DEEP_STUDY_MAX_ITERATIONS: "10"  # Hard ceiling on search+fetch iterations for one deep_studying() call. Starting point per your request — was 60. Raise once you've seen how long 10 iterations actually takes on the Jetson's Ministral-3B and how it feels alongside RAM headroom; 60 is likely too many for AuRoRA's 8GB unified memory to sustain unattended.
DEEP_STUDY_SEED_QUERIES: "6"  # How many concrete sub-queries the model breaks the topic into up front, explored before the adaptive next-query loop kicks in. Keep this comfortably below MAX_ITERATIONS (currently is) so there's still budget left for adaptive follow-ups.
DEEP_STUDY_RESULTS_PER_QUERY: "3"  # SearXNG results considered per sub-query. Falls back to web.yaml's SEARXNG_MAX_RESULTS if unset.
DEEP_STUDY_FETCH_TOP: "3"  # How many of those results actually get fetched per iteration.
DEEP_STUDY_MAX_CHARS_PER_PAGE: "2000"  # Per-page fetched text cap, same role as DEEP_SEARCH_MAX_CHARS_PER_PAGE in web.yaml but scoped to deep_studying's own fetch calls.
DEEP_STUDY_CHUNK_CHARS: "500"  # Chunk size fetched pages are split into before scoring/storing. Falls back to web.yaml's CONDENSE_CHUNK_CHARS if unset.
DEEP_STUDY_MIN_SCORE: "0.15"  # Minimum relevance score for a chunk to survive into distillation. Falls back to web.yaml's CONDENSE_MIN_SCORE if unset.
DEEP_STUDY_TOP_K_FOR_DISTILLATION: "40"  # Max ranked chunks handed to the final synthesis call, scored against the ORIGINAL topic (not individual sub-queries). Lower this if 40 excerpts is more than DEEP_STUDY_SYNTHESIS_MAX_TOKENS can meaningfully use.
DEEP_STUDY_PER_HOST_MIN_INTERVAL: "3.0"  # Minimum seconds between fetches to the same host across the whole session — politeness guard so many iterations can't hammer one domain (e.g. a project's own GitHub) repeatedly.
DEEP_STUDY_SCRATCH_DIR: "~/.aiko/dream"  # Disk-backed scratch SQLite location for the duration of ONE deep_studying() call. Deleted when the call returns — not a persistent index. Long-term storage of results is the caller's job via the on_distilled hook.
DEEP_STUDY_DECISION_MAX_TOKENS: "250"  # Token budget for each "what's the next sub-query, or should we stop" decision call.
DEEP_STUDY_SYNTHESIS_MAX_TOKENS: "900"  # Token budget for the final distillation/synthesis call over the top-K ranked chunks.

# Memorize config
#
# Settings for core/memorize.py, core/embed.py, core/forget.py, and core/consolidate.py.
# Tune local sqlite memory, embedding model behavior, memory decay, and monthly consolidation here.

# -- Storage and embedding endpoint --
SQLITE_MEMORY_PATH: ""  # Optional override; blank uses per-user ~/.aiko/<user_id>/memory.db.
EMBED_BASE_URL: "http://127.0.0.1:8080"  # Embedding server base URL used by core/embed.py.
EMBED_MODEL: "harrier"  # Embedding model id/alias; must match server/custom embedder.
EMBED_DIMS: "640"  # Vector dimensions; must match embedding model and sqlite-vec schema.
EMBED_QUERY_INSTRUCT: "Retrieve relevant memories that answer the query"  # Instruction prefix used for query embeddings; memories/documents stay unprefixed.
EMBED_BATCH_SIZE: "64"  # Embedding batch size for migration/rebuild scripts; lower if memory pressure is high.
EMBED_TIMEOUT_S: "30"  # Seconds before embedding HTTP calls time out.
EMBED_CACHE_PATH: ""  # Optional local embedding/model cache path; blank uses library defaults.
FASTEMBED_CACHE_PATH: ""  # Legacy FastEmbed cache fallback; blank if unused.

# -- Memory extraction and recall --
MEMORY_EXTRACT_MIN_CHARS: "80"  # Minimum turn length before extracting a memory fact.
MEMORY_EXTRACT_MAX_TOKENS: "128"  # Max tokens for memory extraction summaries.
MEMORY_EXTRACT_TIMEOUT: "18"  # Seconds before memory extraction LLM call times out.
EXTRACT_MODEL: ""  # Optional smaller model for extraction; blank falls back to LLM_MODEL.
MEMORY_RECALL_LIMIT: "3"  # Number of memories injected into normal chat context.
MEMORY_MIN_SCORE: "0.0"  # Minimum recall score (same scale as MEMORY_RECALL_SCORE_THRESHOLD below, ~0.015) a memory must clear to be included in context. 0 = off, no memory dropped for being weak.
WRITE_DEDUP_THRESHOLD: "0.95"  # Similarity threshold above which a new memory write is skipped as duplicate; range 0.0-1.0.
MEMORY_WRITE_IDLE_GRACE: "3.0"  # Seconds of idle chat before background memory writes proceed.
MEMORY_WRITE_MAX_WAIT: "45.0"  # Max seconds memory writer waits before forcing the write.

# -- Decay and dream merge --
FORGET_HALF_LIFE_DAYS: "7.0"  # Days until memory retention score halves.
FORGET_ACCESS_COUNT_CAP: "255"  # Maximum access_count retained for decay scoring.
FORGET_CLEANUP_THRESHOLD: "0.1"  # Decay score below which cleanup may prune a memory.
FORGET_GRACE_PERIOD_DAYS: "35"  # Minimum age before ordinary memories can be cleaned up.
DREAM_MERGE_THRESHOLD: "0.88"  # Similarity threshold for merging near-duplicate memories; range 0.0-1.0.
DREAM_BOOST_AMOUNT: "2"  # Access-count boost for memories promoted during dream/reflection.

# -- Search ranking and context budget --
MEMORY_SEARCH_CACHE_SIZE: "128"  # Max number of memory search results cached in-process.
MEMORY_SEARCH_CACHE_TTL: "20.0"  # Seconds before cached memory search result expires.
MEMORY_RANK_RECENCY_WEIGHT: "0.004"  # Small retrieval boost for recent memories (continuous blending, applies to every candidate).
MEMORY_RANK_RECENCY_HALF_LIFE_DAYS: "30"  # Days for recency boost to halve.
MEMORY_RANK_ACCESS_WEIGHT: "0.002"  # Small retrieval boost for frequently recalled memories.
MEMORY_RANK_PINNED_WEIGHT: "0.002"  # Small retrieval boost for pinned memories.
MEMORY_CONTEXT_FACT_CHARS: "220"  # Max characters per individual memory fact injected into context.
MEMORY_CONTEXT_TOTAL_CHARS: "1200"  # Total character budget for all memory facts injected per turn.
MEMORY_LIFECYCLE_BATCH_SIZE: "500"  # Memories processed per batch during cleanup/decay lifecycle runs.

# -- Tiered recall (quick/wide) --
QUICK_KNN_LIMIT: "6"  # Narrow KNN candidate count tried before falling back to full search.
QUICK_FTS_LIMIT: "6"  # Narrow FTS5 candidate count tried before falling back to full search.
MEMORY_RECALL_SCORE_THRESHOLD: "0.015"  # Min final-rank score required at position `limit` for the quick pass to be accepted; below this, search widens to KNN_LIMIT/FTS_LIMIT.

# -- Pinned recency-among-relevant rerank --
MEMORY_RECENCY_RERANK_ENABLED: "1"  # Toggle recency-among-relevant reranking; boolean options (1/0, true/false, yes/no, on/off).
MEMORY_RECENCY_RERANK_THRESHOLD: "0.012"  # Min final score for a candidate to be considered "relevant enough" to be reordered by recency instead of by raw score.

# -- Experience and consolidation --
MONTHLY_CONSOLIDATION_ENABLED: "1"  # Monthly consolidation toggle; options: 1/0, true/false, yes/no, on/off.
MONTHLY_CONSOLIDATION_KEEP_MONTHS: "1"  # Number of recent full months to keep as detailed memories.
MONTHLY_CONSOLIDATION_CHUNK_MEMS: "25"  # Memory facts per fallback monthly summary chunk.
MONTHLY_CONSOLIDATION_MAX_INPUT_CHARS: "6000"  # Max source chars per monthly consolidation LLM request.
MONTHLY_CONSOLIDATION_DELETE_DAILY_SUMMARIES: "1"  # After folding a month's pinned daily facts/day-records into "[YYYY-MM] ..." consolidated facts, delete the daily-granularity originals. Set to 0 to keep consolidation purely additive (compress + archive, no deletion) until you've verified retrieval/growth behavior.
MONTHLY_CONSOLIDATION_MIN_MEMS: "5"  # Skip fallback months with fewer memories than this.
MONTHLY_CONSOLIDATION_LLM_TIMEOUT: "120"  # Seconds before monthly summary LLM calls time out.
MONTHLY_CONSOLIDATION_STATE_PATH: ""  # Optional override; blank uses per-user ~/.aiko/<user_id>/monthly_consolidation_state.jsonl.

# Experience vector-store config
#
# Settings for core/experience.py, Aiko's machine-written procedural trace of
# completed agentic tasks. Experience stores sanitized goal -> steps -> outcome
# records for later RAG recall. It does not use memory forgetting/decay.

EXPERIENCE_DB_PATH: "experience/experience.db"  # Relative paths live under the active user's state dir; encrypted when SQLITE_ENCRYPTION=1.
EXPERIENCE_CONTEXT_CHARS: "2500"  # Max similar-task context characters injected into task mode.
EXPERIENCE_KNN_LIMIT: "20"  # sqlite-vec semantic candidates before RRF fusion.
EXPERIENCE_FTS_LIMIT: "20"  # FTS5 lexical candidates before RRF fusion.
EXPERIENCE_RRF_K: "60"  # Reciprocal Rank Fusion constant; higher dampens rank differences.
EXPERIENCE_RECALL_SCORE_THRESHOLD: "0.012"  # Minimum fused score for a past task to be injected.
EXPERIENCE_MAX_ROWS: "10000"  # Hard cap per user; lowest-scored/oldest rows are pruned only to limit noise/storage.
EXPERIENCE_QUERY_INSTRUCT: "Retrieve similar past agentic task runs"
