# Settings for Aiko's proactive idle check-ins.
#
# These are intentionally conservative: Aiko may gently reach out when the
# session has been quiet for a while, but she should not spam, interrupt an
# active turn, or require any WebUI vision/screen feature.

PROACTIVE_ENABLED: "1"  # Set to 0/false/off to disable idle check-ins.
PROACTIVE_FIRST_IDLE_MIN_SECONDS: "300"  # Earliest first check-in after user activity; 300 = 5 minutes.
PROACTIVE_FIRST_IDLE_MAX_SECONDS: "900"  # Latest first check-in after user activity; 900 = 15 minutes.
PROACTIVE_COOLDOWN_SECONDS: "1800"  # Minimum seconds between proactive check-ins.
PROACTIVE_MAX_PER_HOUR: "2"  # Hard cap for proactive check-ins in a rolling hour.
PROACTIVE_REST_AFTER_SECONDS: "3600"  # After this much idle time, Aiko sends one rest note then stays quiet.
PROACTIVE_USE_LLM: "1"  # Use prompt hints below so the LLM can vary the final wording.
PROACTIVE_TIMEZONE: "America/Vancouver"  # Timezone used for quiet/focus windows.
PROACTIVE_QUIET_WINDOWS:
  - "00:00-06:00"  # Daily quiet hours.
PROACTIVE_FOCUS_WINDOWS:
  - "mon-fri 06:00-19:00"  # Work/focus block.
  - "sat-sun 06:00-11:00"  # Weekend morning focus block.
PROACTIVE_SPEAK: "1"  # Speak the check-in aloud when TTS is currently enabled.
PROACTIVE_REST_MESSAGE: "You've been away for a while so I'll go quiet and rest. Ping me when you need me."
PROACTIVE_PROMPT_HINTS:
  - "Oppa has not spoken to you for a while. What short gentle thing do you want to say to him now?"
  - "Oppa has been quiet for a while. Offer company without being needy or disruptive."
  - "Oppa may be focused or away. Say one brief check-in and make it easy for him to ignore you."
PROACTIVE_REST_PROMPT_HINT: "Oppa has not spoken to you for about an hour. Say one short warm line that you are going quiet and resting until he returns."
PROACTIVE_MESSAGES:
  - "You've been quiet for a bit. Still with me?"
  - "Checking in. Do you want focus time or should I keep you company?"
  - "Still here. If you're deep in something I can stay quiet."
  - "Tiny ping. Need anything or are we in quiet mode?"
