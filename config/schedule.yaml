# Schedule config
#
# Settings for core/schedule.py.
# This config stores scheduler paths and system job times; user-created jobs remain in per-user schedule.json.
# Timezone now lives in config/bioclock.yaml (core/bioclock.py) — the single
# source of truth for "now", used here and everywhere else Aiko needs a clock.

# -- Paths --
WORKSPACE_ROOT: ""  # Optional override; blank uses per-user ~/.aiko/<user_id>/workspace.
SCHEDULE_PATH: ""  # Optional override; blank uses per-user ~/.aiko/<user_id>/workspace/tasks/schedule.json.

# -- System job timing --
DAILY_JOB_HOUR: "0"  # Local hour for daily reflection/dream job; integer 0-23.
DAILY_JOB_MINUTE: "0"  # Local minute for daily reflection/dream job; integer 0-59.
MONTHLY_JOB_HOUR: "0"  # Local hour for monthly consolidation job on the 1st; integer 0-23.
MONTHLY_JOB_MINUTE: "5"  # Local minute for monthly consolidation job; integer 0-59.
