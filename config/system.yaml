# Identity config
#
# Names used in prompts, logs, memories, and UI labels.
# Edit these when changing the assistant display name or the primary user profile.

# -- Identity --
# Assistant display name used in prompts and UI; usually Aiko.
#
AI_NAME: "Aiko"

# -- User State Root --
# Root directory for user state. Per-client data lives under
# ~/.aiko/<user_id>/ (github username, patreon tier, chat history, etc).
# AGE_KEY and ENV_AGE_PATH below are resolved relative to this root too,
# since they're plain filenames, not absolute paths.
#
USER_STATE_ROOT: "~/.aiko"

# -- Secrets Key --
# These are SERVICE-level secrets (one shared LLM/OAuth config for all
# clients), not per-user data — they just happen to live under the same
# root for convenience. Kept as bare filenames so they resolve to
# ~/.aiko/age-key.txt and ~/.aiko/.env.age. Set an absolute path here (or
# via the AGE_KEY / ENV_AGE_PATH env vars) to opt out of that and pin an
# exact location instead — e.g. if you'd rather keep them out of the same
# directory as per-user subfolders.
#
AGE_KEY: "age-key.txt"
ENV_AGE_PATH: ".env.age"

# Bioclock config
#
# Settings for system/bioclock.py — the single source of truth for "now"
# used by every module that reasons about dates or wall-clock time:
# chat/webchat/agentic system prompts, proactive check-ins, and
# system/schedule.py's job timing. One timezone, resolved one way, everywhere.
TIMEZONE: "America/Vancouver"  # IANA timezone name used everywhere Aiko resolves "now"; examples: America/Vancouver, UTC, Asia/Tokyo.

# Schedule config
#
# Settings for system/schedule.py.
# This config stores scheduler paths and system job times; user-created jobs remain in per-user schedule.json.
# Timezone now lives in config/bioclock.yaml (system/bioclock.py) — the single
# source of truth for "now", used here and everywhere else Aiko needs a clock.

# -- Paths --
WORKSPACE_ROOT: ""  # Optional override; blank uses per-user ~/.aiko/<user_id>/workspace.
SCHEDULE_PATH: ""  # Optional override; blank uses per-user ~/.aiko/<user_id>/workspace/tasks/schedule.json.

# -- System job timing --
DAILY_JOB_HOUR: "0"  # Local hour for daily reflection/dream job; integer 0-23.
DAILY_JOB_MINUTE: "0"  # Local minute for daily reflection/dream job; integer 0-59.
MONTHLY_JOB_HOUR: "0"  # Local hour for monthly consolidation job on the 1st; integer 0-23.
MONTHLY_JOB_MINUTE: "5"  # Local minute for monthly consolidation job; integer 0-59.

# Log config
#
# Settings for system/log.py and system/health.py.
# Controls rotating log verbosity and small health-cache timing.

# -- Logging --
LOG_LEVEL: "INFO"  # Python log level; options: DEBUG, INFO, WARNING, ERROR, CRITICAL.
LOG_MAX_BYTES: "5242880"  # Maximum size of logs/aiko.log before rotation.
LOG_BACKUP_COUNT: "3"  # Number of rotated log files to keep.
DB_SIZE_TTL: "1.0"  # Seconds to cache memory DB size in health/vitals display.
