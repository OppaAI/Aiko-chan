# Think config
#
# Settings consumed mostly by core/think.py and shared LLM callers.
# Tune local OpenAI-compatible model endpoint, token budgets, and sampling behavior here.

# -- Model endpoint --
LLM_BASE_URL: "http://localhost:8080/v1"  # OpenAI-compatible chat endpoint, usually llama.cpp /v1 URL.
LLM_MODEL: "qwen"  # Main chat model id/alias; must match the server model name.
REFLECT_MODEL: "qwen"  # Model used for reflection/consolidation; often same as LLM_MODEL.
LLM_TIMEOUT: "120"  # Seconds before chat/reflection LLM HTTP calls time out.

# -- Token budgets --
LLM_MAX_TOKENS: "280"  # Base max tokens for normal chat replies.
BASE_PREDICT: "280"  # Legacy alias for LLM_MAX_TOKENS; keep equal unless old scripts need another value.
CONTEXT_WINDOW_TURNS: "5"  # Number of recent user+assistant turns sent as short-term context.
REASONING_SCALE: "3"  # Multiplier applied to LLM_MAX_TOKENS for reasoning mode.

# -- Semantic search thresholds --
SKILL_SEMANTIC_THRESHOLD: "0.35"  # Minimum cosine similarity for skill matching (0.0-1.0, higher = stricter). Wiki and learned-knowledge thresholds live in wiki.yaml and knowledge.yaml.

# -- Sampling --
TEMPERATURE: "0.80"  # Creativity/randomness; common range 0.2-1.0, higher is more varied.
REPEAT_PENALTY: "1.15"  # Penalty for repeated tokens; common range 1.05-1.25.
REPEAT_LAST_N: "64"  # Token lookback window for repeat penalty; 0 disables on some backends.
TOP_P: "0.92"  # Nucleus sampling cutoff; common range 0.8-0.95.
TOP_K: "50"  # Limits next-token choices to top K; common values 40-100, 0 may disable depending backend.
