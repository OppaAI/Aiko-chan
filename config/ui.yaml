# UI config
#
# Settings for main.py, webui/webui.py, and browser/avatar helpers.
# Controls local ports, browser launch behavior, streaming redraw, and optional HTTPS.

# -- Ports and launch --
HTTP_PORT: "8787"  # Browser WebUI HTTP port.
WS_PORT: "8765"  # Browser WebSocket bridge port.
NO_BROWSER: "0"  # Do not auto-open browser on launch; options: 1/0.
WEBUI_HTTPS: "1"  # Serve WebUI over HTTPS; required for microphone access from LAN hostnames.
SSL_CERT: "/home/oppa-ai/Aiko-chan/webui/.cert/aiko-cert.pem"  # Path to TLS certificate file when WEBUI_HTTPS is enabled; blank disables cert loading.
SSL_KEY: "/home/oppa-ai/Aiko-chan/webui/.cert/aiko-key.pem"  # Path to TLS private key file when WEBUI_HTTPS is enabled; blank disables key loading.

# -- Rendering --
WEBUI_LOCAL_PLAYBACK: "1"  # Play TTS locally as well as in browser; options: 1/0, true/false, yes/no, on/off.
STREAM_DRAW_INTERVAL: "0.05"  # Seconds between streamed-token redraws in active UI.
EMIT_DELAY: "0.012"  # Delay in seconds between word emits for TUI/TTS pacing.
LATENCY_LOG: "1"  # Log per-turn latency timing; options: 1/0, true/false, yes/no, on/off.
