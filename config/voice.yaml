# Aiko voice settings. Secrets stay in .env.
MIOTTS_API_URL: http://localhost:8001
MIOTTS_MODEL: MioTTS-0.4B-Q4_K_M
MIOTTS_PRESET: jp_female
MIOTTS_DEVICE: '-1'
ASR_DEVICE: cuda
ASR_LANGUAGE: auto
ASR_NUM_THREADS: '4'
ASR_MODEL: csukuangfj/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17
LISTEN_VAD_SILENCE_MS: '300'
LISTEN_VAD_PAD_MS: '100'
LISTEN_CHUNK_MS: '30'
LISTEN_VAD_THRESHOLD: '0.5'
LISTEN_SILENCE_CHUNKS: '66'
LISTEN_MIN_CHUNKS: '10'
LISTEN_MAX_SECONDS: '30'
LISTEN_CAPTURE_RATE: '48000'
LISTEN_DEVICE: ''
SPEAKER_VERIFY_ENABLED: '1'
SPEAKER_MODEL_PATH: models/3dspeaker_speech_eres2net_base_sv_en_voxceleb_16k.onnx
SPEAKER_VERIFY_THRESHOLD: '0.5'
SPEAKER_NUM_THREADS: '1'
BARGE_IN_THRESHOLD: '0.65'
BARGE_IN_CONFIRM_CHUNKS: '2'
BARGE_IN_COOLDOWN_MS: '800'
BARGE_IN_ALWAYS_ON: '0'
