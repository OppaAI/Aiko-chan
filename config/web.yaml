# Web config
#
# Settings for core/toolkit/researcher.py and semantic web-search triggering.
# web_search/web_fetch are chat-mode primitives. Task-mode skills should use
# deep_search for snippet-only support or deep_research for fetched-source work.

# -- SearXNG --
SEARXNG_URL: "http://localhost:8888"  # Base URL for self-hosted SearXNG instance.
SEARCH_SEMANTIC_THRESHOLD: "0.70"  # Semantic score to trigger web search from chat; higher means fewer searches.
SEARXNG_MAX_RESULTS: "3"  # Max snippets per SearXNG page for web_search, deep_search, and deep_research URL discovery.

# -- deep_search (task-mode snippet search; no fetch by default) --
DEEP_SEARCH_NUM_SEARCHES: "1"  # Number of SearXNG pages to pull for the same query. Must be >=1 because snippets need a search call.
DEEP_SEARCH_NUM_FETCHES: "0"  # Keep 0: deep_search is snippet-only in task mode. Nonzero is a legacy escape hatch, not the intended workflow.
DEEP_SEARCH_MAX_CHARS_PER_PAGE: "2000"  # Legacy only if DEEP_SEARCH_NUM_FETCHES is forced above 0.
DEEP_SEARCH_MAX_WORKERS: "8"  # Max concurrent threads for multi-page search and deep_research fetches.

# -- deep_research (task-mode fetched-source research / self-learning) --
DEEP_RESEARCH_NUM_SEARCHES: "1"  # Search pages per research round, used only to discover candidate URLs.
DEEP_RESEARCH_NUM_FETCHES: "2"  # Full pages fetched per round. Set 0 only to disable page reading, which makes deep_research much less useful.
DEEP_RESEARCH_MAX_CHARS_PER_PAGE: "2000"  # Per fetched page text cap before evidence condensation.
DEEP_RESEARCH_MAX_ROUNDS: "5"  # Hard ceiling on adaptive fetched-source rounds.
DEEP_RESEARCH_EVIDENCE_CHARS_FOR_DECISION: "6000"  # Condensed evidence chars the continue/refine decision call sees.
DEEP_RESEARCH_EVIDENCE_CHARS_FOR_SYNTHESIS: "8000"  # Condensed evidence chars the final synthesis call sees.
DEEP_RESEARCH_DECISION_MAX_TOKENS: "200"  # Token budget for continue/refine decision call.
DEEP_RESEARCH_SYNTHESIS_MAX_TOKENS: "600"  # Token budget for final synthesis call.

# -- in-memory evidence condensation for fetched pages --
CONDENSE_CHUNK_CHARS: "500"  # Chunk size for fetched pages before relevance scoring.
CONDENSE_TOP_K: "8"  # Max relevant chunks kept in the final condensed bundle.
CONDENSE_MIN_SCORE: "0.15"  # Minimum relevance score to keep a chunk; below this content is dropped.
CONDENSE_MAX_CHUNKS_TO_SCORE: "60"  # Caps embedding latency regardless of total fetched volume.

# -- web_fetch download guard & caching --
WEB_FETCH_MAX_DOWNLOAD_BYTES: "5000000"  # Hard byte cap per fetch; download aborted mid-stream before extraction/truncation.
WEB_FETCH_TIMEOUT_SECONDS: "8"  # Per-request timeout for web_fetch's underlying HTTP call.
TOOLS_CACHE_TTL_SECONDS: "900"  # In-process cache lifetime (seconds) for both search results and fetched pages.
TOOLS_CACHE_MAX_ENTRIES: "256"  # Max entries per cache before oldest entries are evicted.
