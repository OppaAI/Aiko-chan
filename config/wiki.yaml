# Wiki config
#
# Settings for core/wiki.py (wiki/persona/config/docs indexing).
# Two-stage RAG pattern: semantic-rank WHICH items are candidates, then
# chunk-rank WHICH PART of each selected item gets injected.

# -- item-level semantic ranking (which wiki/persona/config/docs items are candidates at all) --
WIKI_SEMANTIC_THRESHOLD: "0.35"  # Min cosine similarity for a wiki item to be considered a candidate match.

# -- chunk-level RAG selection (which part of a selected item gets injected) --
WIKI_CHUNK_CHARS: "600"  # Chunk size (chars) a matched wiki item's body is split into before relevance scoring. Shared by wiki_context_for.
WIKI_CHUNKS_PER_ITEM: "3"  # Max relevant chunks kept per matched wiki item.
WIKI_CHUNK_MIN_SCORE: "0.30"  # Min relevance score to keep a chunk; below this the item falls back to its first chunk.
