services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aiko_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + gRPC
      - "6334:6334"   # gRPC (optional)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  qdrant_data:
