services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aiko_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  searxng:
    image: searxng/searxng:latest
    container_name: aiko_searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081

volumes:
  qdrant_data:
