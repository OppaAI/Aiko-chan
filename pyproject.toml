[project]
requires-python = ">=3.10,<3.11"
name = "ai-chan"
version = "0.1.0"
description = "Aiko-chan: AI companion with persistent memory, web search, and conversational interface"
readme = "README.md"
dependencies = [
    "click>=8.4.1",
    "fastembed>=0.8.0",
    "fugashi>=1.5.2",
    "jaconv>=0.5.0",
    "mem0ai[nlp]>=0.1.0",
    "mojimoji>=0.0.13",
    "numpy<2",
    "ollama>=0.3.0",
    "pyopenjtalk>=0.4.1",
    "python-dotenv>=1.0.0",
    "qdrant-client>=1.9.0",
    "realtimetts[kokoro]>=0.7.3",
    "requests>=2.34.2",
    "scipy>=1.15.3",
    "sounddevice>=0.5.5",
    "soundfile>=0.13.1",
    "spacy>=3.8.14",
    "unidic>=1.1.0",
]

[[tool.uv.index]]
url = "https://pypi.jetson-ai-lab.io/jp6/cu126"
default = true
