[project]
requires-python = ">=3.12,<3.13"
name = "Aiko-chan"
version = "0.1.5"
description = "Aiko-chan: AI companion with persistent memory, web search, and conversational interface"
readme = "README.md"
dependencies = [
    "click>=8.4.1",
    "fastembed>=0.8.0",
    "numpy>=2.4.6",
    "onnxruntime>=1.23.2",
    "openai>=2.43.0",
    "python-dotenv>=1.0.0",
    "reazonspeech-k2-asr",
    "requests>=2.34.2",
    "scipy>=1.17.1",
    "sherpa-onnx>=1.13.3",
    "silero-vad>=6.2.1",
    "sounddevice>=0.5.5",
    "soundfile>=0.14.0",
    "sqlite-vec>=0.1.9",
    "torch>=2.11.0",
    "torchaudio>=2.11.0",
]

[tool.uv.sources]
reazonspeech-k2-asr = { path = "../reazonspeech/pkg/k2-asr" }
sherpa-onnx = { url = "https://huggingface.co/csukuangfj2/sherpa-onnx-wheels/resolve/main/cuda/1.13.2/sherpa_onnx-1.13.2+cuda-cp312-cp312-linux_aarch64.whl", marker = "platform_machine == 'aarch64'" }
