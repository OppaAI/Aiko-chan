[pytest]
# Default collection: only tests/unit/. Running bare `pytest` from the repo
# root will NOT pick up tests/perf/ or eval/ -- those are opt-in only, since
# perf benchmarks need real hardware/models and eval scripts aren't pytest
# tests at all (see eval/README.md).
testpaths = tests/unit

markers =
    perf: performance/latency benchmarks requiring real hardware (Jetson) and real models -- excluded from default test runs, invoke explicitly with `-m perf --benchmark-only` against tests/perf/

# Fail loudly on unknown markers instead of silently ignoring typos.
addopts = --strict-markers
