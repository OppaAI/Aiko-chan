<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Aiko-chan · OppaAI</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="./webui.css">
</head>
<body>
  <!-- ── OAuth Login Modal ──────────────────────────────────────────────────── -->
  <div id="auth-overlay" class="auth-overlay show">
    <div class="auth-panel">
      <div class="auth-title">Aiko-chan</div>
      <div class="auth-subtitle">Neural Interface Access</div>
      
      <div class="auth-buttons">
        <button class="auth-btn github" onclick="loginGitHub()">
          <span class="icon">◆</span> GitHub
        </button>
        <button class="auth-btn huggingface" onclick="loginHuggingFace()">
          <span class="icon">⬢</span> Hugging Face
        </button>
        <button class="auth-btn proton" onclick="loginProton()">
          <span class="icon">◉</span> Proton
        </button>
        <button class="auth-btn discord" onclick="loginDiscord()">
          <span class="icon">◆</span> Discord
        </button>
      </div>
      
      <div class="auth-footer">
        <span class="auth-status" id="auth-status"></span>
      </div>
    </div>
  </div>

  <!-- loading splash -->
  <div id="load-overlay">
    <div id="load-title">Aiko-chan</div>
    <div id="load-sub">VRM VIEWER // OPPAAI</div>
    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>
    <div id="load-msg">loading model…</div>
  </div>

  <!-- ── VRM side ─────────────────────────────────────────────────────────── -->
  <div id="vrm-side">
    <canvas id="canvas"></canvas>

    <div id="vrm-hud">
      <div id="vrm-title">Aiko · OppaAI</div>
      <div id="vrm-emotion">—</div>
    </div>

    <div id="ws-dots">
      <div class="status-line">
        <div class="dot" id="ws-dot"></div><span id="ws-label">ws offline</span>
      </div>
      <div class="status-line">
        <div class="dot" id="speak-dot"></div><span id="speak-label">idle</span>
      </div>
      <div class="status-line">
        <div class="dot" id="vad-dot"></div><span id="vad-status">vad loading…</span>
      </div>
    </div>
  </div>

  <!-- ── right panel ──────────────────────────────────────────────────────── -->
  <div id="panel">

    <div id="panel-header">
      <div id="panel-title">Neural Interface</div>
      <div id="panel-clock">—</div>
    </div>

    <div id="content">
      <!-- init phase -->
      <div id="init-panel">
        <div class="init-heading">Initializing Neural Systems</div>
        <div class="all-online" id="all-online">[ All Systems Online ]</div>
      </div>

      <!-- chat phase -->
      <div id="chat-panel">
        <div id="tool-status"></div>
      </div>
    </div>

    <div id="vitals">
      <span id="v-mode">⌨ TXT</span>
      <span id="v-ram">RAM —</span>
      <span id="v-tok">0 tokens</span>
      <span id="v-toks">— t/s</span>
      <span id="v-up">↑ 0s</span>
    </div>

    <div id="voice-status"></div>

    <div id="input-row">
      <span id="prompt-label">❯</span>
      <input id="user-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a message…">
      <button id="mic-btn" class="input-btn" title="Microphone auto-starts when available">🎤</button>
      <button id="send-btn" class="input-btn">send</button>
    </div>

  </div><!-- #panel -->


  <!-- ── Silero VAD processor ────────────────────────────────────────────── -->
  <script src="./vad.js"></script>

  <!-- ── Three.js / VRM ──────────────────────────────────────────────────── -->
  <script type="importmap">
{
  "imports": {
    "three":            "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/":    "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

  <script type="module" src="./vrm.js"></script>

  <!-- ── Chat UI + WebSocket ─────────────────────────────────────────────── -->
  <script src="./webui.js"></script>

</body>

</html>
