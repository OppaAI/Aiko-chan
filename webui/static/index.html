<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Aiko-chan · OppaAI</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --bg2: #0e0e17;
      --border: #1e1428;
      --pink: #c651a8;
      --purple: #9b7fd4;
      --mauve: #c8a8f0;
      --cyan: #51d4c8;
      --dim: #4a3a6a;
      --dimmer: #2a1a4a;
      --text: #c8b8e8;
      --you: #51d4c8;
      --aiko: #c8a8f0;
      --sys: #4a3a6a;
      --input-fg: #c8b8e8;
      --scrollbar: #1e1428;
    }

    body {
      background: var(--bg);
      font-family: 'Courier New', monospace;
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: grid;
      /* left: VRM  |  right: chat panel */
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      grid-template-rows: 100dvh;
    }

    /* ── VRM side ───────────────────────────────────────────────────── */

    #vrm-side {
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #vrm-hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg, rgba(10, 10, 15, .9) 0%, transparent 100%);
      pointer-events: none;
      font-size: 11px;
      letter-spacing: .15em;
    }

    #vrm-title {
      color: var(--purple);
      text-transform: uppercase;
    }

    #vrm-emotion {
      color: var(--dim);
      transition: color .3s;
    }

    #vrm-emotion.active {
      color: var(--mauve);
    }

    #ws-dots {
      position: absolute;
      bottom: 12px;
      left: 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
      font-size: 10px;
      color: var(--dim);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dimmer);
      transition: background .3s;
    }

    .dot.on {
      background: var(--purple);
      box-shadow: 0 0 6px var(--purple);
    }

    .dot.speak {
      background: var(--pink);
      box-shadow: 0 0 8px var(--pink);
      animation: blink .6s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    /* ── right panel ────────────────────────────────────────────────── */

    #panel {
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      height: 100dvh;
      overflow: hidden;
    }

    /* header */
    #panel-header {
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #panel-title {
      font-size: 12px;
      letter-spacing: .25em;
      color: var(--pink);
      text-transform: uppercase;
    }

    #panel-clock {
      font-size: 10px;
      color: var(--dim);
    }

    /* init / chat views — both live in the same scroll region */
    #content {
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar) transparent;
    }

    #content::-webkit-scrollbar {
      width: 4px;
    }

    #content::-webkit-scrollbar-track {
      background: transparent;
    }

    #content::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 2px;
    }

    /* ── init panel ─────────────────────────────────────────────────── */

    #init-panel {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    #init-panel.hidden {
      display: none;
    }

    .init-heading {
      font-size: 11px;
      letter-spacing: .2em;
      color: var(--pink);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .step-row {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 0 8px;
      font-size: 11px;
      line-height: 1.7;
      align-items: baseline;
    }

    .step-icon {
      color: var(--dim);
      text-align: center;
    }

    .step-icon.ok {
      color: var(--cyan);
    }

    .step-icon.skip {
      color: var(--dim);
    }

    .step-icon.err {
      color: var(--pink);
    }

    .step-label {
      color: var(--text);
    }

    .step-detail {
      color: var(--dim);
      font-size: 10px;
    }

    .all-online {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: .2em;
      color: var(--cyan);
      text-transform: uppercase;
      display: none;
    }

    .all-online.show {
      display: block;
    }

    /* ── chat area ──────────────────────────────────────────────────── */

    #chat-panel {
      display: none;
      flex-direction: column;
      gap: 2px;
    }

    #chat-panel.show {
      display: flex;
    }

    .msg {
      font-size: 12px;
      line-height: 1.65;
      padding: 1px 0;
    }

    .msg-you {
      color: var(--you);
    }

    .msg-aiko {
      color: var(--aiko);
    }

    .msg-sys {
      color: var(--sys);
      font-size: 11px;
    }

    .msg-prefix {
      font-weight: 700;
    }

    /* streaming cursor */
    .cursor::after {
      content: '▋';
      animation: cur .7s infinite;
      color: var(--mauve);
      margin-left: 1px;
    }

    @keyframes cur {

      0%,
      49% {
        opacity: 1
      }

      50%,
      100% {
        opacity: 0
      }
    }

    /* tool status line */
    #tool-status {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .1em;
      min-height: 16px;
      margin-top: 2px;
      transition: opacity .2s;
    }

    #tool-status:empty {
      opacity: 0;
    }

    /* ── vitals bar ─────────────────────────────────────────────────── */

    #vitals {
      border-top: 1px solid var(--border);
      padding: 5px 16px;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .1em;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    #vitals span {
      white-space: nowrap;
    }

    #vitals .hi {
      color: var(--purple);
    }

    /* ── voice status ───────────────────────────────────────────────── */

    #voice-status {
      border-top: 1px solid var(--border);
      padding: 5px 16px;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .12em;
      text-transform: uppercase;
      min-height: 24px;
      flex-shrink: 0;
      transition: color .2s;
    }

    #voice-status.listening {
      color: var(--cyan);
    }

    #voice-status.transcribing {
      color: var(--mauve);
    }

    #voice-status.waiting {
      color: var(--dim);
    }

    /* ── input row ──────────────────────────────────────────────────── */

    #input-row {
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 8px 12px;
      gap: 8px;
      flex-shrink: 0;
    }

    #prompt-label {
      color: var(--purple);
      font-size: 13px;
      flex-shrink: 0;
      user-select: none;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--input-fg);
      caret-color: var(--mauve);
    }

    #send-btn {
      background: none;
      border: 1px solid var(--dimmer);
      color: var(--dim);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: .15em;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 2px;
      text-transform: uppercase;
      transition: border-color .2s, color .2s;
    }

    #send-btn:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    /* ── loading overlay ────────────────────────────────────────────── */

    #load-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 200;
      transition: opacity .8s;
    }

    #load-overlay.fade {
      opacity: 0;
      pointer-events: none;
    }

    #load-title {
      font-size: 22px;
      letter-spacing: .35em;
      color: var(--purple);
      text-transform: uppercase;
    }

    #load-sub {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .2em;
    }

    #progress-bar {
      width: 180px;
      height: 1px;
      background: var(--dimmer);
      position: relative;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: var(--purple);
      width: 0%;
      transition: width .3s;
      box-shadow: 0 0 8px var(--purple);
    }

    #load-msg {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .15em;
    }
  </style>
</head>

<body>

  <!-- loading splash -->
  <div id="load-overlay">
    <div id="load-title">Aiko-chan</div>
    <div id="load-sub">VRM VIEWER // OPPAAI</div>
    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>
    <div id="load-msg">loading model…</div>
  </div>

  <!-- ── VRM side ─────────────────────────────────────────────────────────── -->
  <div id="vrm-side">
    <canvas id="canvas"></canvas>

    <div id="vrm-hud">
      <div id="vrm-title">Aiko · OppaAI</div>
      <div id="vrm-emotion">—</div>
    </div>

    <div id="ws-dots">
      <div class="dot" id="ws-dot"></div><span id="ws-label">ws offline</span>
      &nbsp;
      <div class="dot" id="speak-dot"></div><span id="speak-label">idle</span>
    </div>
  </div>

  <!-- ── right panel ──────────────────────────────────────────────────────── -->
  <div id="panel">

    <div id="panel-header">
      <div id="panel-title">Neural Interface</div>
      <div id="panel-clock">—</div>
    </div>

    <!-- scrollable content region (init log OR chat) -->
    <div id="content">

      <!-- init phase -->
      <div id="init-panel">
        <div class="init-heading">Initializing Neural Systems</div>
        <!-- step rows injected by JS -->
        <div class="all-online" id="all-online">[ All Systems Online ]</div>
      </div>

      <!-- chat phase -->
      <div id="chat-panel">
        <!-- message rows injected by JS -->
        <div id="tool-status"></div>
      </div>

    </div>

    <!-- vitals -->
    <div id="vitals">
      <span id="v-mode">⌨ TXT</span>
      <span id="v-ram">RAM —</span>
      <span id="v-tok">0 tokens</span>
      <span id="v-toks">— t/s</span>
      <span id="v-up">↑ 0s</span>
    </div>

    <!-- voice status ticker -->
    <div id="voice-status"></div>

    <!-- text input -->
    <div id="input-row">
      <span id="prompt-label">❯</span>
      <input id="user-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a message…">
      <button id="send-btn">send</button>
    </div>

  </div><!-- #panel -->


  <!-- ── Three.js / VRM ──────────────────────────────────────────────────────── -->
  <script type="importmap">
{
  "imports": {
    "three":            "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/":    "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

  <script type="module" src="./aiko-vrm.js"></script>

  <!-- ── Chat UI + WebSocket ─────────────────────────────────────────────────── -->
  <script>
    // ── DOM refs ─────────────────────────────────────────────────────────────────
    const initPanel = document.getElementById('init-panel');
    const chatPanel = document.getElementById('chat-panel');
    const toolStatus = document.getElementById('tool-status');
    const content = document.getElementById('content');
    const allOnline = document.getElementById('all-online');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const voiceSt = document.getElementById('voice-status');
    const clock = document.getElementById('panel-clock');
    const wsDot = document.getElementById('ws-dot');
    const wsLabel = document.getElementById('ws-label');

    const vTok = document.getElementById('v-tok');
    const vToks = document.getElementById('v-toks');
    const vRam = document.getElementById('v-ram');
    const vUp = document.getElementById('v-up');
    const vMode = document.getElementById('v-mode');

    // ── clock ─────────────────────────────────────────────────────────────────────
    function tickClock() {
      const now = new Date();
      clock.textContent = now.toLocaleString('en-CA', {
        month: 'short', day: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true,
      });
    }
    tickClock();
    setInterval(tickClock, 1000);

    // ── step / init tracking ─────────────────────────────────────────────────────
    const INIT_LABELS = {
      think_start: 'Inference Engine',
      think_warmup: 'Model Warm-up',
      mem_sqlite_vec: 'Vector Database',
      mem_embed: 'Embedding Model',
      mem_cleanup: 'Memory Lifecycle',
      mem_ready: 'Memory Cortex',
      speak_miotts: 'TTS Engine',
      speak_ready: 'Voice Output',
      speak_skip: 'Voice Output',
      listen_ready: 'Speech Input',
      listen_skip: 'Speech Input',
    };

    const SPINNER_FRAMES = ['⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏'];
    let spinFrame = 0;
    setInterval(() => {
      spinFrame = (spinFrame + 1) % SPINNER_FRAMES.length;
      document.querySelectorAll('.step-icon.spin').forEach(el => {
        el.textContent = SPINNER_FRAMES[spinFrame];
      });
    }, 80);

    const stepRows = {}; // key → {row, icon, label, detail}
    let doneCount = 0, totalSteps = 0;

    function upsertStep(key, state, detail) {
      const lbl = INIT_LABELS[key] || key;

      if (!stepRows[key]) {
        totalSteps++;
        const row = document.createElement('div');
        row.className = 'step-row';
        row.innerHTML = `
      <span class="step-icon spin">${SPINNER_FRAMES[0]}</span>
      <span>
        <span class="step-label">${lbl}</span>
        <span class="step-detail"> — ${detail || ''}</span>
      </span>`;
        initPanel.insertBefore(row, allOnline);
        stepRows[key] = {
          row,
          icon: row.querySelector('.step-icon'),
          detail: row.querySelector('.step-detail'),
        };
      }

      const { icon, detail: detEl } = stepRows[key];
      detEl.textContent = detail ? ` — ${detail}` : '';

      if (state === 'loading') {
        icon.className = 'step-icon spin';
        icon.textContent = SPINNER_FRAMES[spinFrame];
      } else if (state === 'done') {
        icon.className = 'step-icon ok';
        icon.textContent = '✓';
        doneCount++;
      } else if (state === 'skip') {
        icon.className = 'step-icon skip';
        icon.textContent = '–';
        doneCount++;
      } else if (state === 'error') {
        icon.className = 'step-icon err';
        icon.textContent = '✗';
        doneCount++;
      }

      if (totalSteps > 0 && doneCount >= totalSteps) {
        allOnline.classList.add('show');
      }
      scrollBottom();
    }

    // ── phase switch ─────────────────────────────────────────────────────────────
    function switchToChat() {
      initPanel.classList.add('hidden');
      chatPanel.classList.add('show');
      input.focus();
    }

    // ── chat rendering ───────────────────────────────────────────────────────────
    let streamEl = null; // the currently streaming <span>

    function addMessage(sender, text) {
      // flush any open stream first
      flushStream();

      const div = document.createElement('div');
      if (sender === 'you') {
        div.className = 'msg msg-you';
        div.innerHTML = `<span class="msg-prefix">you: </span>${esc(text)}`;
      } else if (sender === 'aiko') {
        div.className = 'msg msg-aiko';
        div.innerHTML = `<span class="msg-prefix">Aiko: </span>${esc(text)}`;
      } else {
        div.className = 'msg msg-sys';
        div.textContent = `  ◈  ${text}`;
      }
      chatPanel.insertBefore(div, toolStatus);
      scrollBottom();
    }

    function appendToken(text) {
      if (!streamEl) {
        const div = document.createElement('div');
        div.className = 'msg msg-aiko';
        streamEl = document.createElement('span');
        streamEl.className = 'cursor';
        div.innerHTML = '<span class="msg-prefix">Aiko: </span>';
        div.appendChild(streamEl);
        chatPanel.insertBefore(div, toolStatus);
      }
      streamEl.textContent += text;
      scrollBottom();
    }

    function flushStream() {
      if (streamEl) {
        streamEl.classList.remove('cursor');
        streamEl = null;
      }
      toolStatus.textContent = '';
    }

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function scrollBottom() {
      content.scrollTop = content.scrollHeight;
    }

    // ── vitals ────────────────────────────────────────────────────────────────────
    function applyVitals(v) {
      vTok.textContent = `${(v.tokens || 0).toLocaleString()} tok`;
      vToks.textContent = v.tok_s > 0 ? `${v.tok_s} t/s` : '— t/s';
      vRam.textContent = `RAM ${v.ram || '—'}`;
      vUp.textContent = `↑ ${v.uptime || '—'}`;
      const asr = v.asr, tts = v.tts;
      vMode.textContent = (asr ? '🎤 ASR' : '⌨ TXT') + '  ' + (tts ? '🔊 TTS' : '🔇 TTS');
    }

    // ── voice status ──────────────────────────────────────────────────────────────
    const VOICE_LABELS = {
      waiting: '⏸  waiting for Aiko…',
      listening: '🎤  listening…',
      transcribing: '⚙  transcribing…',
      idle: '',
    };
    function applyVoice(status) {
      voiceSt.textContent = VOICE_LABELS[status] ?? '';
      voiceSt.className = status === 'idle' ? '' : status;
    }

    // ── text input ────────────────────────────────────────────────────────────────
    function submitInput() {
      const text = input.value.trim();
      if (!text || !wsReady()) return;
      ws.send(JSON.stringify({ type: 'user_input', text }));
      input.value = '';
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitInput(); }
    });
    sendBtn.addEventListener('click', submitInput);

    // ── WebSocket ──────────────────────────────────────────────────────────────────
    let ws = null;

    function wsReady() { return ws && ws.readyState === WebSocket.OPEN; }

    function connectWS() {
      // derive WS port from URL hash or default 8765
      const wsPort = parseInt(new URLSearchParams(location.search).get('ws') || '8765');
      ws = new WebSocket(`ws://${location.hostname}:${wsPort}/`);

      ws.onopen = () => {
        wsDot.className = 'dot on';
        wsLabel.textContent = 'ws connected';
      };

      ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch (_) { return; }

        switch (msg.type) {

          case 'step':
            upsertStep(msg.key, msg.state, msg.detail || '');
            break;

          case 'phase':
            if (msg.value === 'chat') switchToChat();
            break;

          case 'chat':
            addMessage(msg.sender, msg.text);
            break;

          case 'token':
            appendToken(msg.text);
            break;

          case 'commit':
            flushStream();
            break;

          case 'tool':
            toolStatus.textContent = msg.status ? `  ⚙  ${msg.status}` : '';
            break;

          case 'vitals':
            applyVitals(msg);
            break;

          case 'voice':
            applyVoice(msg.status);
            break;

          case 'expression':
            if (window.aikoSetExpression) window.aikoSetExpression(msg.name, msg.intensity ?? 1.0);
            break;

          case 'viseme':
            if (window.aikoSetViseme) window.aikoSetViseme(msg.viseme, msg.weight ?? 1.0);
            break;
        }
      };

      ws.onclose = () => {
        wsDot.className = 'dot';
        wsLabel.textContent = 'ws offline';
        setTimeout(connectWS, 3000);
      };
      ws.onerror = () => ws.close();
    }

    connectWS();
  </script>

</body>

</html>
